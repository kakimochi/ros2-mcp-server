name: ROS2 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:humble-desktop
      
    steps:
    - uses: actions/checkout@v3

    - name: Setup Python environment
      shell: bash
      run: |
        apt-get update && apt-get install -y python3-pip
        python3 -m pip install --upgrade pip
        python3 -m pip install uv
        uv venv --python /usr/bin/python3.10
        source .venv/bin/activate
        uv pip install -e .

    - name: Setup ROS2 environment
      shell: bash
      run: |
        source /opt/ros/humble/setup.bash
        echo "source /opt/ros/humble/setup.bash" >> $GITHUB_ENV

    - name: Run linting
      shell: bash
      run: |
        source .venv/bin/activate
        python3 -m pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run unit tests
      shell: bash
      run: |
        source .venv/bin/activate
        source /opt/ros/humble/setup.bash
        # Add unit test commands here
        # Example: python -m pytest tests/

    - name: Test ROS2 node functionality
      shell: bash
      run: |
        source .venv/bin/activate
        source /opt/ros/humble/setup.bash
        # Start ROS2 daemon
        ros2 daemon start
        # Run a basic test to verify the node can be launched
        timeout 10s python3 ros2-mcp-server.py || code=$?; if [[ $code -ne 124 && $code -ne 0 ]]; then exit $code; fi
