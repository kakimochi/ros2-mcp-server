name: ROS2 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kakimochi/ros2_humble_test:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python environment
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv
        uv venv --python /usr/bin/python3.10
        source .venv/bin/activate
        uv pip install -e .

    - name: Setup ROS2 environment
      run: |
        source /opt/ros/humble/setup.bash
        echo "source /opt/ros/humble/setup.bash" >> $GITHUB_ENV

    - name: Run linting
      run: |
        source .venv/bin/activate
        python -m pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run unit tests
      run: |
        source .venv/bin/activate
        source /opt/ros/humble/setup.bash
        # Add unit test commands here
        # Example: python -m pytest tests/

    - name: Test ROS2 node functionality
      run: |
        source .venv/bin/activate
        source /opt/ros/humble/setup.bash
        # Start ROS2 daemon
        ros2 daemon start
        # Run a basic test to verify the node can be launched
        timeout 10s python ros2-mcp-server.py || code=$?; if [[ $code -ne 124 && $code -ne 0 ]]; then exit $code; fi
